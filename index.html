<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLX 투어 자동 내레이션 프로그램</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; text-align: center; padding: 20px; background-color: #f8f9fa; color: #333; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #00529b; margin-bottom: 5px; }
        p.subtitle { color: #7f8c8d; font-size: 14px; margin-bottom: 25px; }
        .btn-group { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        button { padding: 15px 30px; font-size: 18px; font-weight: bold; background-color: #00529b; color: white; border: none; border-radius: 8px; cursor: pointer; width: 100%; margin-bottom: 20px; }
        button.lang-btn { width: auto; padding: 10px 20px; background-color: #28a745; margin-bottom: 0; }
        button.lang-btn:active { background-color: #218838; }
        .location-card { background: #ecf0f1; margin-bottom: 15px; padding: 20px; border-radius: 8px; text-align: left; transition: all 0.3s ease; }
        .location-name { font-weight: bold; font-size: 18px; margin-bottom: 10px; color: #2c3e50; }
        .status-text { font-size: 15px; font-weight: bold; color: #7f8c8d; }
        .completed { background: #d4efdf; border-left: 5px solid #27ae60; }
        .active { background: #fff3cd; border-left: 5px solid #f39c12; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🚌 CLX 투어 자동 내레이션 프로그램</h2>
        <p class="subtitle">버스 이동 경로에 맞춰 다국어 오디오가 자동 재생됩니다.</p>
        
        <button id="mainStartBtn" onclick="initiateTourStart()">투어 시작하기</button>

        <div id="languageSelection" style="display: none;">
            <h3>언어를 선택해주세요:</h3>
            <div class="btn-group">
                <button class="lang-btn" onclick="setLanguageAndStartTour('ko')">한국어</button>
                <button class="lang-btn" onclick="setLanguageAndStartTour('en')">English</button>
                <button class="lang-btn" onclick="setLanguageAndStartTour('jp')">日本語</button>
            </div>
        </div>

        <div id="location-list"></div>
    </div>

    <!-- 오디오 파일은 JavaScript에서 동적으로 src를 설정합니다. -->
    <audio id="playerAudio" preload="auto"></audio>

    <script>
        // 🚨 울산CLX 버스 투어의 실제 목적지 위도/경도로 수정해주세요.
        const LOCATIONS = [
            { id: 1, name: "울산CLX 본관", lat: 35.531969, lon: 129.294212, played: false },
            { id: 2, name: "#1CDU 옆", lat: 35.5100, lon: 129.3100, played: false },
            { id: 3, name: "내항부두", lat: 35.5200, lon: 129.3200, played: false }
        ];

        // 버스 투어 특성상 반경을 조금 넓게 잡는 것이 좋습니다. (기본 100m로 설정)
        const TRIGGER_RADIUS_METERS = 100; 
        
        const listContainer = document.getElementById('location-list');
        const mainStartBtn = document.getElementById('mainStartBtn');
        const languageSelectionDiv = document.getElementById('languageSelection');
        const playerAudio = document.getElementById('playerAudio');

        let watchId = null;
        let currentTargetIndex = 0; // 현재 버스가 찾아가야 할 다음 목적지 순서
        let selectedLanguage = ''; // 선택된 언어 코드 (ko, en, jp)

        // 오디오 파일 이름 규칙 (예: audio_ko_1.mp3, audio_en_1.mp3)
        function getAudioFileName(locationId, lang) {
            return `audio_${lang}_${locationId}.mp3`;
        }

        function initUI() {
            listContainer.innerHTML = '';
            LOCATIONS.forEach(location => {
                const div = document.createElement('div');
                div.className = 'location-card';
                div.id = `card-${location.id}`;
                div.innerHTML = `
                    <div class="location-name">${location.name}</div>
                    <div class="status-text" id="status-${location.id}">대기 중</div>
                `;
                listContainer.appendChild(div);
            });
        }
        initUI();

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const φ1 = lat1 * Math.PI / 180;
            const φ2 = lat2 * Math.PI / 180;
            const Δφ = (lat2 - lat1) * Math.PI / 180;
            const Δλ = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(Δφ / 2) * Math.sin(Δφ / 2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ / 2) * Math.sin(Δλ / 2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
        }

        // 투어 시작 버튼 클릭 (GPS 활성화 및 언어 선택 창 표시)
        function initiateTourStart() {
            try {
                mainStartBtn.innerText = "GPS 신호 찾는 중...";
                mainStartBtn.style.backgroundColor = "#e67e22";
                mainStartBtn.disabled = true;

                if (!navigator.geolocation) {
                    alert("이 기기는 GPS를 지원하지 않습니다.");
                    resetUIForError();
                    return;
                }

                // GPS 권한 요청 및 준비 (실제 추적은 언어 선택 후 시작)
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        console.log("GPS 준비 완료:", position.coords.latitude, position.coords.longitude);
                        mainStartBtn.style.display = 'none'; // 시작 버튼 숨기기
                        languageSelectionDiv.style.display = 'block'; // 언어 선택 창 표시
                        
                        // 오디오 권한 획득용: 모든 오디오 로드 (무음)
                        // Note: playerAudio를 사용하므로 이 부분은 필요 없어짐.
                    },
                    (error) => {
                        alert("GPS 위치 권한을 허용해주세요. (스마트폰 설정 확인)");
                        resetUIForError();
                    },
                    { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
                );

            } catch (error) {
                alert("코드 에러: " + error.message);
                resetUIForError();
            }
        }

        // 언어 선택 후 투어 시작
        function setLanguageAndStartTour(lang) {
            selectedLanguage = lang;
            languageSelectionDiv.style.display = 'none'; // 언어 선택 창 숨기기
            mainStartBtn.style.display = 'block'; // 시작 버튼 다시 표시 (텍스트 업데이트용)
            mainStartBtn.innerText = "투어 진행 중... (GPS 수신 중)";
            mainStartBtn.style.backgroundColor = "#00529b"; // 원래 색상으로 복구
            mainStartBtn.disabled = true; // 다시 비활성화

            // 현재 찾아가야 할 첫 번째 장소의 UI를 노란색(활성)으로 변경
            if (LOCATIONS.length > 0) {
                document.getElementById(`card-${LOCATIONS[0].id}`).classList.add("active");
                document.getElementById(`status-${LOCATIONS[0].id}`).innerText = "첫 번째 장소로 이동 중...";
            }
            
            // 실시간 GPS 추적 시작
            startGPSMonitoring();
        }

        function startGPSMonitoring() {
            watchId = navigator.geolocation.watchPosition(
                (position) => {
                    if (currentTargetIndex >= LOCATIONS.length) {
                        navigator.geolocation.clearWatch(watchId);
                        mainStartBtn.innerText = "CLX 투어가 완료되었습니다 🎉";
                        mainStartBtn.style.backgroundColor = "#27ae60";
                        return;
                    }

                    const currentLat = position.coords.latitude;
                    const currentLon = position.coords.longitude;
                    
                    const location = LOCATIONS[currentTargetIndex];
                    const distance = Math.round(getDistance(currentLat, currentLon, location.lat, location.lon));
                    const statusEl = document.getElementById(`status-${location.id}`);
                    const cardEl = document.getElementById(`card-${location.id}`);

                    if (distance <= TRIGGER_RADIUS_METERS && !location.played) {
                        location.played = true;
                        
                        // 선택된 언어에 맞는 오디오 파일 로드 및 재생
                        playerAudio.src = getAudioFileName(location.id, selectedLanguage);
                        playerAudio.muted = false; // 혹시 모를 음소거 해제
                        playerAudio.play();
                        
                        statusEl.innerText = "✅ 도착 완료! 안내 방송 재생 중";
                        statusEl.style.color = "#27ae60";
                        cardEl.classList.remove("active");
                        cardEl.classList.add("completed");

                        // 다음 목표 장소로 타겟 순서 이동
                        currentTargetIndex++;
                        if (currentTargetIndex < LOCATIONS.length) {
                            const nextLocation = LOCATIONS[currentTargetIndex];
                            document.getElementById(`card-${nextLocation.id}`).classList.add("active");
                            document.getElementById(`status-${nextLocation.id}`).innerText = "다음 장소로 이동 중...";
                        }
                    } else if (!location.played) {
                        // 아직 해당 위치가 아닐 경우 (활성화된 장소에만 표시)
                        if (cardEl.classList.contains("active")) {
                             statusEl.innerText = `❌ 아직 해당 위치가 아닙니다. (${distance}m 남음)`;
                             statusEl.style.color = "#e74c3c";
                        }
                       
                    }
                },
                (error) => {
                    alert("GPS 신호가 약하거나 위치 권한이 없습니다. (스마트폰 설정 확인)");
                    resetUIForError();
                },
                { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
            );
        }

        // 에러 발생 시 UI 초기 상태로 복구
        function resetUIForError() {
            mainStartBtn.innerText = "투어 시작하기";
            mainStartBtn.style.backgroundColor = "#00529b";
            mainStartBtn.disabled = false;
            languageSelectionDiv.style.display = 'none';
            // 모든 위치 카드 상태 초기화 (옵션)
            LOCATIONS.forEach(loc => {
                const cardEl = document.getElementById(`card-${loc.id}`);
                const statusEl = document.getElementById(`status-${loc.id}`);
                cardEl.classList.remove("active", "completed");
                statusEl.innerText = "대기 중";
                statusEl.style.color = "#7f8c8d";
            });
            currentTargetIndex = 0; // 순서 초기화
            LOCATIONS.forEach(loc => loc.played = false); // 재생 상태 초기화
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
        }
    </script>
</body>
</html>
